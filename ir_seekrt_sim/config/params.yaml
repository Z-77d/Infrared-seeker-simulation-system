# ============================================================
#  Infrared Seeker Simulation System - Parameter Configuration File
# ============================================================

# ------ Target Parameters ------
target:
  temperature: 500.0          # Target temperature [K]
  emissivity: 0.90            # Emissivity (0~1)
  area: 1.0                   # Target area [m²]
  distance: 5000.0            # Target distance [m]
  position_3d: [0.0, 0.0, 5000.0]   # Position in world coordinates [m]

# ------ Spectral Band Parameters ------
band:
  # Options: "MWIR" (mid-wave 3-5 um) or "LWIR" (long-wave 8-12 um)
  name: "MWIR"
  lambda_min: 3.0e-6          # Minimum wavelength [m]
  lambda_max: 5.0e-6          # Maximum wavelength [m]
  n_samples: 500              # Number of samples for wavelength integration

# ------ Atmospheric Transmission Parameters ------
atmosphere:
  model: "exponential"        # "exponential" | "lowtran" | "custom"
  transmittance: 0.75         # Overall atmospheric transmittance (0~1)
  absorption_coeff: 2.0e-5    # Absorption coefficient for exponential model [1/m]
  # Aerosol scattering (Mie scattering approximation)
  aerosol_visibility: 23.0    # Visibility [km]
  humidity: 0.5               # Relative humidity (0~1)

# ------ Optical System Parameters ------
optics:
  focal_length: 0.1           # Focal length [m]
  aperture_diameter: 0.05     # Aperture diameter [m]
  f_number: 2.0               # F-number = focal_length / aperture_diameter
  transmission: 0.85          # Optical system transmittance
  # Point spread function
  psf_model: "gaussian"       # "gaussian" | "airy" | "custom"
  psf_sigma_pixels: 1.2       # Gaussian PSF sigma (pixels)

# ------ Detector Parameters ------
detector:
  # Array specification
  array_rows: 320
  array_cols: 240
  pixel_pitch: 30.0e-6        # Pixel pitch [m] (30 μm)
  # Response characteristics
  quantum_efficiency: 0.75    # Quantum efficiency
  responsivity: 2.0           # Responsivity [A/W]
  integration_time: 1.0e-3    # Integration time [s]
  # Noise parameters
  read_noise_electrons: 50.0  # Readout noise [e-]
  dark_current: 1.0e+4        # Dark current [e-/s]
  full_well_capacity: 1.0e+7  # Full well capacity [e-]
  # ADC
  adc_bits: 14                # ADC bit depth
  # Non-uniformity
  fpn_sigma: 0.01             # Fixed pattern noise sigma (relative value)
  # NETD validation metric
  netd_target: 0.05           # Target NETD [K]

# ------ Background Parameters ------
background:
  temperature: 290.0          # Background temperature [K]
  emissivity: 0.95            # Background emissivity
  # Sky background (additional contribution)
  sky_radiance_fraction: 0.1  # Fraction of sky radiance contribution

# ------ Aero-Optical Effect Parameters ------
aero_optics:
  enable: true
  # Turbulence strength
  Cn2: 1.0e-14                # Refractive index structure constant [m^(-2/3)]
  path_length: 100.0          # Aero-optical turbulence path length [m]
  # von Kármán turbulence spectrum parameters
  L0: 10.0                    # Outer scale [m]
  l0: 0.01                    # Inner scale [m]
  # Image jitter
  jitter_sigma_pixels: 0.5    # Global image jitter sigma [pixels]
  n_phase_screens: 5          # Number of phase screens
  # Flow velocity (affects jitter frequency)
  flow_velocity: 300.0        # Flow velocity [m/s]

## ------ Simulation Control ------
#simulation:
#  random_seed: 42
#  output_dir: "output"
#  save_intermediate: true     # Save intermediate results
#  output_format: "tiff"       # "tiff" | "png" | "npy"
#  n_frames: 20                # Number of simulation frames

# ------ Simulation Control ------
simulation:
  random_seed: 42
  output_dir: "output"
  save_intermediate: false    # Recommended to disable intermediate result saving when running many frames to save disk space
  output_format: "png"        # Use PNG for video generation for easier preview
  n_frames: 100               # Increased to 100 frames to simulate a 5-second approach process
